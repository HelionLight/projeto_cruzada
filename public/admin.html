<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Cruzada</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Painel Administrativo - Cruzada</h1>
    <div id="loginForm">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Usuário">
      <input type="password" id="password" placeholder="Senha">
      <button id="loginBtn">Entrar</button>
    </div>
    <div id="adminPanel" style="display: none;">
      <h2>Registros Pendentes - Cruzados</h2>
      <button id="exportBtn" class="btnExport">📥 Exportar para Excel</button>
      <div id="pendingList">
        <table class="pendingTable">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>CPF</th>
              <th>Foto</th>
              <th>PDF</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="pendingTableBody">
          </tbody>
        </table>
      </div>

      <h2 style="margin-top: 40px;">Registros Pendentes - Voluntários</h2>
      <div id="pendingVoluntariosList">
        <table class="pendingTable">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Nº Cruzado</th>
              <th>Foto</th>
              <th>Termo Assinado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="pendingVoluntariosTableBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
